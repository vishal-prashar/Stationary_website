<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <title>Advanced E-Commerce Stationery</title>
</head>
<body>
    <header class="bg-primary text-white text-center p-4">
        <h1>Stationery Shop</h1>
        <input type="text" id="search" placeholder="Search for products..." class="form-control w-50 mx-auto">
    </header>
    <div class="container mt-4">
        <div class="row" id="product-list">
            <!-- Product Card Example -->
            <div class="col-md-4">
                <div class="card">
                    <img src="https://source.unsplash.com/300x200/?notebook" class="card-img-top" alt="Notebook">
                    <div class="card-body">
                        <h5 class="card-title">Notebook</h5>
                        <p class="card-text">Price: $10.00</p>
                        <button class="btn btn-success" onclick="addToCart()">Add to Cart</button>
                        <button class="btn btn-info" onclick="addToWishlist()">Add to Wishlist</button>
                    </div>
                </div>
            </div>
            <!-- More cards can be added similarly -->
        </div>
    </div>
    <footer class="bg-dark text-white text-center p-4">
        <p>&copy; 2026 Stationery Shop</p>
    </footer>
    <script>
        function addToCart() {
            alert('Added to cart!');
        }
        function addToWishlist() {
            alert('Added to wishlist!');
        }
    </script>
</body>
</html>
