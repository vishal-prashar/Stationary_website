<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishal Stationery Store</title>

<style>
body {margin:0;font-family:Arial;background:#f1f3f6}

/* HEADER */
header {
  background:#131921;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header input {
  width:50%;
  padding:10px;
  border:none;
  border-radius:5px;
}

/* PRODUCTS */
.container {padding:20px}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
}

button {
  background:#ffd814;
  border:none;
  padding:10px;
  width:100%;
  margin-top:10px;
  cursor:pointer;
}

/* CART */
#cart {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:white;
  box-shadow:-5px 0 10px rgba(0,0,0,0.2);
  padding:15px;
  overflow:auto;
}

.cart-item {
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

.qty-btn {
  padding:2px 6px;
  background:#ccc;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h2>🛍 Vishal Store</h2>
  <input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</header>

<div class="container">
  <div class="products" id="productList"></div>
</div>

<div id="cart">
  <h3>Cart 🛒</h3>
  <div id="cartItems"></div>
  <h3>Total: ₹<span id="total">0</span></h3>
  <button onclick="orderWhatsApp()">Order via WhatsApp</button>
</div>

<script>

/* PRODUCTS DATA */
const products = [
  {name:"Notebook", price:50, img:"https://images.unsplash.com/photo-1583484963886-cfe2bff2945f"},
  {name:"Pen", price:10, img:"https://images.unsplash.com/photo-1586075010923-2dd4570fb338"},
  {name:"Pencil", price:5, img:"https://images.unsplash.com/photo-1596495578065-6e0763fa1178"},
  {name:"Geometry Box", price:120, img:"https://images.unsplash.com/photo-1581092335397-9583eb92d232"},
  {name:"Markers", price:60, img:"https://images.unsplash.com/photo-1588776814546-ec7e3e5d7d84"},
  {name:"Sticky Notes", price:40, img:"https://images.unsplash.com/photo-1586281380349-632531db7ed4"}
];

let cart = [];

/* DISPLAY PRODUCTS */
function displayProducts(list){
  let html="";
  list.forEach((p,i)=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button onclick="addToCart(${i})">Add to Cart</button>
    </div>`;
  });
  document.getElementById("productList").innerHTML=html;
}

displayProducts(products);

/* SEARCH */
function searchProduct(){
  let value=document.getElementById("search").value.toLowerCase();
  let filtered=products.filter(p=>p.name.toLowerCase().includes(value));
  displayProducts(filtered);
}

/* ADD TO CART */
function addToCart(index){
  let item=products[index];
  let found=cart.find(p=>p.name===item.name);

  if(found){
    found.qty++;
  } else {
    cart.push({...item, qty:1});
  }

  updateCart();
}

/* UPDATE CART */
function updateCart(){
  let html="";
  let total=0;

  cart.forEach((item,i)=>{
    total += item.price * item.qty;

    html+=`
    <div class="cart-item">
      ${item.name} (₹${item.price})
      <div>
        <button class="qty-btn" onclick="changeQty(${i},-1)">-</button>
        ${item.qty}
        <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
      </div>
    </div>`;
  });

  document.getElementById("cartItems").innerHTML=html;
  document.getElementById("total").innerText=total;
}

/* CHANGE QUANTITY */
function changeQty(i,change){
  cart[i].qty += change;

  if(cart[i].qty<=0){
    cart.splice(i,1);
  }

  updateCart();
}

/* WHATSAPP ORDER */
function orderWhatsApp(){
  let msg="🛒 *Order Details*%0A%0A";

  cart.forEach(item=>{
    msg += `${item.name} x${item.qty} = ₹${item.price * item.qty}%0A`;
  });

  let total=document.getElementById("total").innerText;
  msg += `%0A*Total: ₹${total}*`;

  let phone="919876543210"; // change

  window.open(`https://wa.me/${phone}?text=${msg}`);
}

</script>

</body>
</html>
