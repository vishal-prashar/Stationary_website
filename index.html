<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stationery Shop</title>
  <style>
    body {font-family: Arial, sans-serif; margin:0; padding:0;}
    header {background:#2c3e50; color:#fff; padding:15px; text-align:center;}
    nav {background:#34495e; padding:10px; text-align:center;}
    nav a {color:white; margin:10px; text-decoration:none;}
    .container {padding:20px;}
    .products {display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px;}
    .card {border:1px solid #ddd; padding:15px; border-radius:10px; text-align:center;}
    button {background:#27ae60; color:white; border:none; padding:10px; cursor:pointer;}
    footer {background:#2c3e50; color:white; text-align:center; padding:10px; margin-top:20px;}
  </style>
</head>
<body>

<header>
  <h1>My Stationery Shop</h1>
  <p>All your school & office needs</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#products">Products</a>
  <a href="#cart">Cart</a>
  <a href="#contact">Contact</a>
</nav>

<div class="container" id="products">
  <h2>Products</h2>
  <div class="products">
    <div class="card">
      <h3>Notebook</h3>
      <p>₹50</p>
      <button onclick="addToCart('Notebook',50)">Add to Cart</button>
    </div>
    <div class="card">
      <h3>Pen</h3>
      <p>₹10</p>
      <button onclick="addToCart('Pen',10)">Add to Cart</button>
    </div>
    <div class="card">
      <h3>Pencil</h3>
      <p>₹5</p>
      <button onclick="addToCart('Pencil',5)">Add to Cart</button>
    </div>
    <div class="card">
      <h3>Geometry Box</h3>
      <p>₹120</p>
      <button onclick="addToCart('Geometry Box',120)">Add to Cart</button>
    </div>
  </div>
</div>

<div class="container" id="cart">
  <h2>Cart</h2>
  <ul id="cartItems"></ul>
  <h3>Total: ₹<span id="total">0</span></h3>
</div>

<div class="container" id="contact">
  <h2>Contact Us</h2>
  <p>Email: yourshop@email.com</p>
  <p>Phone: +91 99999 99999</p>
</div>

<footer>
  <p>© 2026 Stationery Shop</p>
</footer>

<script>
  let cart = [];
  let total = 0;

  function addToCart(product, price) {
    cart.push({product, price});
    total += price;
    updateCart();
  }

  function updateCart() {
    const cartList = document.getElementById('cartItems');
    cartList.innerHTML = '';

    cart.forEach(item => {
      const li = document.createElement('li');
      li.textContent = item.product + ' - ₹' + item.price;
      cartList.appendChild(li);
    });

    document.getElementById('total').textContent = total;
  }
</script>

</body>
</html>
